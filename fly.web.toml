# fly.toml app configuration file generated for deft-evolution-web on 2026-03-16T23:57:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deft-evolution-web'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '10s'

[build]
  dockerfile = 'docker/Dockerfile.web'

  [build.args]
    NEXT_PUBLIC_API_URL = 'https://deft-evolution-api.fly.dev'
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = 'pk_test_ZW5oYW5jZWQtcGFyYWtlZXQtMzAuY2xlcmsuYWNjb3VudHMuZGV2JA'
    NEXT_PUBLIC_CLERK_SIGN_IN_URL = '/sign-in'
    NEXT_PUBLIC_CLERK_SIGN_UP_URL = '/sign-up'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
