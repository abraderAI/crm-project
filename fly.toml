# Fly.io configuration for DEFT Evolution API
# See: https://fly.io/docs/reference/configuration/

app = "deft-evolution-api"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "docker/Dockerfile"

[env]
  SERVER_PORT = "8080"
  SERVER_HOST = "0.0.0.0"
  SQLITE_PATH = "/data/deft.db"
  LOG_LEVEL = "info"
  RBAC_POLICY_PATH = "config/rbac-policy.yaml"
  UPLOAD_DIR = "/data/uploads"
  UPLOAD_MAX_SIZE = "104857600"

# IO Channels — set via: fly secrets set CHAT_JWT_SECRET=... INTERNAL_API_KEY=...
# CHAT_JWT_SECRET = ""       # Required: min 32 chars
# INTERNAL_API_KEY = ""      # Required: internal bridge auth
# LIVEKIT_URL = ""           # Required for voice channel
# LIVEKIT_API_KEY = ""       # Required for voice channel
# LIVEKIT_API_SECRET = ""    # Required for voice channel
# LIVEKIT_WEBHOOK_TOKEN = "" # Required for voice channel

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/readyz"

[mounts]
  source = "deft_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
