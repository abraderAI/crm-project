version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SQLITE_PATH=/data/deft.db
      - LOG_LEVEL=debug
      - CORS_ORIGINS=http://localhost:3000
      - RBAC_POLICY_PATH=config/rbac-policy.yaml
    volumes:
      - sqlite-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    image: node:20-alpine
    working_dir: /app
    command: echo "Web placeholder - Next.js will be configured in Phase 11"
    ports:
      - "3000:3000"

volumes:
  sqlite-data:
