name: RBAC User Tiers Implementation

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Phase to implement (1-7)'
        required: true
        type: string
        default: '1'
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Manual dispatch: run a specific phase ──────────────────────────────────
  implement:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Init deft submodule (with fallback to latest)
        run: |
          git submodule update --init --depth=1 deft 2>/dev/null || \
          (rm -rf deft && git clone --depth=1 https://github.com/visionik/deft deft)

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: 'api/go.sum'

      - name: Install task CLI
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Ensure rbac-phase labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 7); do
            gh label create "rbac-phase:$i" \
              --color "7c3aed" \
              --description "RBAC User Tiers Phase $i" 2>/dev/null || true
          done

      - name: Run Oz agent for phase ${{ inputs.phase }}
        id: oz_agent
        uses: warpdotdev/oz-agent-action@main
        with:
          prompt: |
            Implement Phase ${{ inputs.phase }} of the DEFT Evolution CRM project (abraderAI/crm-project).

            START BY reading AGENTS.md — it contains all required framework reading and coding standards.
            Then read SPECIFICATION-rbac-user-tiers.md and implement everything listed under Phase ${{ inputs.phase }}.

            SPECIFICATION SUMMARY — Phase dependencies (do NOT implement other phases):
              Phase 1: Data Model & Backend Foundation (no deps — start here)
              Phase 2: Frontend Infrastructure (depends on Phase 1)
              Phase 3: Tier 1 & Tier 2 Home Screens (depends on Phase 2)
              Phase 4: Tier 3 & Tier 5 Home Screens (depends on Phase 3)
              Phase 5: Tier 4 & Tier 6 Home Screens (depends on Phase 2)
              Phase 6: Chatbot — widget, API endpoint, lead capture, live agent handoff, anon promotion (depends on Phase 3)
              Phase 7: Conversion flows (Tier 2→3) + home screen customization polish (depends on Phases 3–6)

            REQUIREMENTS:
            - Follow every rule in AGENTS.md and the deft files it references
            - Implement ALL tasks listed under Phase ${{ inputs.phase }} in SPECIFICATION-rbac-user-tiers.md
            - TDD: write tests first, watch fail, implement, refactor
            - ≥85% test coverage (lines, functions, branches, statements)
            - Run `task check` — it MUST fully pass before creating the PR
            - Push your work to branch: rbac-phase/${{ inputs.phase }}
            - Open a PR to main if you are able to, but do not worry if you cannot
          warp_api_key: ${{ secrets.WARP_API_KEY }}

      - name: Open PR if agent did not; ensure rbac-phase label exists
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="rbac-phase/${{ inputs.phase }}"
          LABEL="rbac-phase:${{ inputs.phase }}"
          # Check if branch exists remotely
          if ! git ls-remote --exit-code origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH not found — agent may not have pushed. Skipping."
            exit 0
          fi
          # Check if a PR already exists for this branch
          PR_NUMBER=$(gh pr list --repo abraderAI/crm-project \
            --head "$BRANCH" --state open --json number \
            --jq '.[0] | .number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "PR #$PR_NUMBER already exists for $BRANCH — ensuring label is set."
            gh pr edit "$PR_NUMBER" --repo abraderAI/crm-project --add-label "$LABEL" 2>/dev/null || true
            exit 0
          fi
          echo "Creating PR for $BRANCH"
          gh pr create \
            --repo abraderAI/crm-project \
            --head "$BRANCH" \
            --base main \
            --title "feat(rbac-phase-${{ inputs.phase }}): user tiers implementation" \
            --label "$LABEL" \
            --body "Automated PR for RBAC User Tiers Phase ${{ inputs.phase }}. See SPECIFICATION-rbac-user-tiers.md for details."

  # ── Auto-chain: when a phase PR is merged, trigger the next phase(s) ───────
  #
  # Dependency graph:
  #   1 → 2 → 3 → 4
  #           3 → 6
  #       2 → 5
  #   {4 + 5 + 6} → 7
  #
  auto-chain:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine next phases
        id: next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Which rbac-phase was just merged?
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} \
            --json labels --jq '[.labels[].name]')
          echo "Merged PR labels: $LABELS"

          MERGED_PHASE=""
          for i in $(seq 1 7); do
            if echo "$LABELS" | grep -q "\"rbac-phase:$i\""; then
              MERGED_PHASE=$i
              break
            fi
          done

          if [ -z "$MERGED_PHASE" ]; then
            echo "No rbac-phase label found on merged PR — skipping auto-chain."
            echo "next_phases=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Merged rbac-phase: $MERGED_PHASE"

          # Helper: count merged PRs with a given rbac-phase label
          check_merged() {
            local p=$1
            COUNT=$(gh pr list --state merged --label "rbac-phase:$p" \
              --json number --jq 'length' 2>/dev/null)
            echo "${COUNT:-0}"
          }

          NEXT=""

          case $MERGED_PHASE in
            1) NEXT="2" ;;

            # Phase 2 unblocks both Phase 3 (sequential) and Phase 5 (parallel)
            2) NEXT="3 5" ;;

            # Phase 3 unblocks both Phase 4 and Phase 6 (parallel)
            3) NEXT="4 6" ;;

            # Phases 4, 5, 6: trigger Phase 7 only when ALL THREE are merged
            4|5|6)
              P4=$(check_merged 4)
              P5=$(check_merged 5)
              P6=$(check_merged 6)
              if [ "$P4" -gt 0 ] && [ "$P5" -gt 0 ] && [ "$P6" -gt 0 ]; then
                NEXT="7"
              else
                echo "Waiting: Phase 4=${P4} Phase 5=${P5} Phase 6=${P6} merged (need all 3 for Phase 7)"
              fi
              ;;

            7) echo "🎉 RBAC User Tiers implementation complete!" ;;
          esac

          NEXT=$(echo $NEXT | xargs)  # trim whitespace
          echo "next_phases=$NEXT" >> $GITHUB_OUTPUT
          echo "Next phases to trigger: $NEXT"

      - name: Trigger next phase(s)
        if: steps.next.outputs.next_phases != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for phase in ${{ steps.next.outputs.next_phases }}; do
            echo "→ Triggering rbac-phase $phase"
            gh workflow run rbac-user-tiers.yml -f phase=$phase
          done
