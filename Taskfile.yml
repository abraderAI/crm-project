version: '3'

set: [errexit, nounset, pipefail]

vars:
  API_DIR: ./api
  WEB_DIR: ./web
  WIDGET_DIR: ./widget
  BUILD_DIR: ./api/bin
  COVERAGE_THRESHOLD: "85"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the API server binary
    dir: '{{.API_DIR}}'
    cmds:
      - mkdir -p ../api/bin
      - go build -o ../api/bin/server ./cmd/server
    sources:
      - '**/*.go'
    generates:
      - '../api/bin/server'

  cli:build:
    desc: Build the CLI binary
    dir: '{{.API_DIR}}'
    cmds:
      - mkdir -p ../api/bin
      - go build -o ../api/bin/deft ./cmd/cli
    sources:
      - '**/*.go'
    generates:
      - '../api/bin/deft'

  fmt:
    desc: Format Go code
    dir: '{{.API_DIR}}'
    cmds:
      - gofmt -w .

  lint:
    desc: Lint Go code
    dir: '{{.API_DIR}}'
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    dir: '{{.API_DIR}}'
    cmds:
      - go test -race -count=1 ./...

  test:coverage:
    desc: Run tests with coverage (must be ≥85%)
    dir: '{{.API_DIR}}'
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./internal/... ./pkg/...
      - go tool cover -func=coverage.out
      - |
        TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${TOTAL}%"
        if [ "$(awk "BEGIN {print (${TOTAL} < {{.COVERAGE_THRESHOLD}})}" )" -eq 1 ]; then
          echo "FAIL: Coverage ${TOTAL}% is below {{.COVERAGE_THRESHOLD}}% threshold"
          exit 1
        fi
        echo "PASS: Coverage ${TOTAL}% meets {{.COVERAGE_THRESHOLD}}% threshold"

  test:fuzz:
    desc: Run fuzz tests (short mode for CI)
    dir: '{{.API_DIR}}'
    cmds:
      - go test -race -fuzz=. -fuzztime=5s ./pkg/pagination/
      - go test -race -fuzz=. -fuzztime=5s ./internal/config/
      - go test -race -fuzz=FuzzJWTValidation -fuzztime=5s ./internal/auth/
      - go test -race -fuzz=FuzzAPIKeyValidation -fuzztime=5s ./internal/auth/
      - go test -race -fuzz=FuzzOrgCreate -fuzztime=5s ./internal/org/
      - go test -race -fuzz=FuzzOrgUpdate -fuzztime=5s ./internal/org/
      - go test -race -fuzz=FuzzSanitizeFTSQuery -fuzztime=5s ./internal/search/
      - go test -race -fuzz=FuzzValidateContentType -fuzztime=5s ./internal/upload/
      - go test -race -fuzz=FuzzWebhookURL -fuzztime=5s ./internal/webhook/
      - go test -race -fuzz=FuzzMatchesFilter -fuzztime=5s ./internal/webhook/
      - go test -race -fuzz=FuzzPipelineTransition -fuzztime=5s ./internal/pipeline/
      - go test -race -fuzz=FuzzValidateTransition -fuzztime=5s ./internal/pipeline/
      - go test -race -fuzz=FuzzScoringEvaluate -fuzztime=5s ./internal/scoring/
      - go test -race -fuzz=FuzzScoringCustomRules -fuzztime=5s ./internal/scoring/
      - go test -race -fuzz=FuzzUpdateSettingsValues -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzRBACOverride -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzFeatureFlagKey -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzSettingsKey -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzImpersonationToken -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzExportFilters -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzUsageQueryParams -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzExportType -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzFailedAuthPeriod -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzImpersonationCreate -fuzztime=5s ./internal/admin/
      - go test -race -fuzz=FuzzValidateSettings -fuzztime=5s ./internal/channel/
      - go test -race -fuzz=FuzzInboundEvent -fuzztime=5s ./internal/channel/
      - go test -race -fuzz=FuzzEmailBody -fuzztime=5s ./internal/channel/email/
      - go test -race -fuzz=FuzzMIMEParsing -fuzztime=5s ./internal/channel/email/
      - go test -race -fuzz=FuzzEmailHeaders -fuzztime=5s ./internal/channel/email/
      - go test -race -fuzz=FuzzWebhookPayload -fuzztime=5s ./internal/channel/voice/
      - go test -race -fuzz=FuzzTranscriptEvent -fuzztime=5s ./internal/channel/voice/
      - go test -race -fuzz=FuzzUserQuery -fuzztime=5s ./internal/cli/agent/
      - go test -race -fuzz=FuzzAPIResponse -fuzztime=5s ./internal/cli/agent/
      - go test -race -fuzz=FuzzChatMessage -fuzztime=5s ./internal/channel/chat/
      - go test -race -fuzz=FuzzEmbedKey -fuzztime=5s ./internal/channel/chat/
      - go test -race -fuzz=FuzzFingerprint -fuzztime=5s ./internal/channel/chat/

  check:
    desc: Run all pre-commit checks (fmt, lint, test, coverage)
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: test:coverage
      - task: web:fmt:check
      - task: web:lint
      - task: web:typecheck
      - task: web:test:coverage
      - task: widget:build
      - task: widget:test:coverage

  dev:
    desc: Start development server
    dir: '{{.API_DIR}}'
    cmds:
      - go run ./cmd/server

  web:fmt:
    desc: Format frontend code
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx prettier --write 'src/**/*.{ts,tsx}'

  web:fmt:check:
    desc: Check frontend code formatting
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx prettier --check 'src/**/*.{ts,tsx}'

  web:lint:
    desc: Lint frontend code
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx eslint src/

  web:typecheck:
    desc: TypeScript type check
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx tsc --noEmit

  web:test:
    desc: Run frontend tests
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx vitest run

  web:test:coverage:
    desc: Run frontend tests with coverage (must be ≥85%)
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx vitest run --coverage

  web:build:
    desc: Build frontend
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx next build

  web:e2e:
    desc: Run Playwright E2E smoke tests
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx playwright test

  web:e2e:smoke:
    desc: Run Playwright smoke tests only
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx playwright test --grep @smoke

  widget:build:
    desc: Build chat widget IIFE bundle
    dir: '{{.WIDGET_DIR}}'
    cmds:
      - node esbuild.config.mjs
    sources:
      - 'src/**/*.ts'
    generates:
      - 'dist/widget.js'

  widget:test:
    desc: Run widget tests
    dir: '{{.WIDGET_DIR}}'
    cmds:
      - npx vitest run

  widget:test:coverage:
    desc: Run widget tests with coverage (must be ≥85%)
    dir: '{{.WIDGET_DIR}}'
    cmds:
      - npx vitest run --coverage

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f {{.API_DIR}}/coverage.out
      - rm -rf {{.WEB_DIR}}/.next
      - rm -rf {{.WIDGET_DIR}}/dist
