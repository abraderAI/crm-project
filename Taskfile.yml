version: '3'

set: [errexit, nounset, pipefail]

vars:
  API_DIR: ./api
  WEB_DIR: ./web
  BUILD_DIR: ./api/bin
  COVERAGE_THRESHOLD: "85"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the API server binary
    dir: '{{.API_DIR}}'
    cmds:
      - mkdir -p ../api/bin
      - go build -o ../api/bin/server ./cmd/server
    sources:
      - '**/*.go'
    generates:
      - '../api/bin/server'

  fmt:
    desc: Format Go code
    dir: '{{.API_DIR}}'
    cmds:
      - gofmt -w .

  lint:
    desc: Lint Go code
    dir: '{{.API_DIR}}'
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    dir: '{{.API_DIR}}'
    cmds:
      - go test -race -count=1 ./...

  test:coverage:
    desc: Run tests with coverage (must be ≥85%)
    dir: '{{.API_DIR}}'
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./internal/... ./pkg/...
      - go tool cover -func=coverage.out
      - |
        TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${TOTAL}%"
        if [ "$(echo "${TOTAL} < {{.COVERAGE_THRESHOLD}}" | bc -l)" -eq 1 ]; then
          echo "FAIL: Coverage ${TOTAL}% is below {{.COVERAGE_THRESHOLD}}% threshold"
          exit 1
        fi
        echo "PASS: Coverage ${TOTAL}% meets {{.COVERAGE_THRESHOLD}}% threshold"

  test:fuzz:
    desc: Run fuzz tests (short mode for CI)
    dir: '{{.API_DIR}}'
    cmds:
      - go test -race -fuzz=. -fuzztime=5s ./pkg/pagination/
      - go test -race -fuzz=. -fuzztime=5s ./internal/config/
      - go test -race -fuzz=FuzzJWTValidation -fuzztime=5s ./internal/auth/
      - go test -race -fuzz=FuzzAPIKeyValidation -fuzztime=5s ./internal/auth/
      - go test -race -fuzz=FuzzOrgCreate -fuzztime=5s ./internal/org/
      - go test -race -fuzz=FuzzOrgUpdate -fuzztime=5s ./internal/org/
      - go test -race -fuzz=FuzzSanitizeFTSQuery -fuzztime=5s ./internal/search/
      - go test -race -fuzz=FuzzValidateContentType -fuzztime=5s ./internal/upload/
      - go test -race -fuzz=FuzzWebhookURL -fuzztime=5s ./internal/webhook/
      - go test -race -fuzz=FuzzMatchesFilter -fuzztime=5s ./internal/webhook/
      - go test -race -fuzz=FuzzPipelineTransition -fuzztime=5s ./internal/pipeline/
      - go test -race -fuzz=FuzzValidateTransition -fuzztime=5s ./internal/pipeline/
      - go test -race -fuzz=FuzzScoringEvaluate -fuzztime=5s ./internal/scoring/
      - go test -race -fuzz=FuzzScoringCustomRules -fuzztime=5s ./internal/scoring/

  check:
    desc: Run all pre-commit checks (fmt, lint, test, coverage)
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - task: test:coverage
      - task: web:fmt:check
      - task: web:lint
      - task: web:typecheck
      - task: web:test:coverage

  dev:
    desc: Start development server
    dir: '{{.API_DIR}}'
    cmds:
      - go run ./cmd/server

  web:fmt:
    desc: Format frontend code
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx prettier --write 'src/**/*.{ts,tsx}'

  web:fmt:check:
    desc: Check frontend code formatting
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx prettier --check 'src/**/*.{ts,tsx}'

  web:lint:
    desc: Lint frontend code
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx eslint src/

  web:typecheck:
    desc: TypeScript type check
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx tsc --noEmit

  web:test:
    desc: Run frontend tests
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx vitest run

  web:test:coverage:
    desc: Run frontend tests with coverage (must be ≥85%)
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx vitest run --coverage

  web:build:
    desc: Build frontend
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx next build

  web:e2e:
    desc: Run Playwright E2E smoke tests
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx playwright test

  web:e2e:smoke:
    desc: Run Playwright smoke tests only
    dir: '{{.WEB_DIR}}'
    cmds:
      - npx playwright test --grep @smoke

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f {{.API_DIR}}/coverage.out
      - rm -rf {{.WEB_DIR}}/.next
