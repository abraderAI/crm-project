      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        metadata:
          type: string
        type:
          $ref: "#/components/schemas/SpaceType"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Board:
      type: object
      properties:
        id:
          type: string
          format: uuid
