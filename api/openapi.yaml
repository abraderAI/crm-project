# ═══════════════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk-issued JWT token
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Org-scoped API key

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrgPath:
      name: org
      in: path
      required: true
      description: Org ID or slug
      schema:
        type: string
    SpacePath:
      name: space
      in: path
      required: true
      description: Space ID or slug
      schema:
        type: string
    BoardPath:
      name: board
      in: path
      required: true
      description: Board ID or slug
      schema:
        type: string
    ThreadPath:
      name: thread
      in: path
      required: true
      description: Thread ID or slug
      schema:
        type: string
    UserIdPath:
      name: userID
      in: path
      required: true
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      description: Base64-encoded UUIDv7 cursor for pagination
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Number of items per page (1-100, default 50)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    DateFrom:
      name: from
      in: query
      description: Start date (ISO 8601)
      schema:
        type: string
        format: date
    DateTo:
      name: to
      in: query
      description: End date (ISO 8601)
      schema:
        type: string
        format: date

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ServiceUnavailable:
      description: Service Unavailable
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

  schemas:
    # ─── Shared ────────────────────────────────────────────────────────────
    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details
      properties:
        type:
          type: string
          format: uri
          example: "https://httpstatuses.com/400"
        title:
          type: string
          example: Bad Request
        status:
          type: integer
          example: 400
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    PageInfo:
      type: object
      properties:
        next_cursor:
          type: string
        has_more:
          type: boolean

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        page_info:
          $ref: "#/components/schemas/PageInfo"

    # ─── Enums ─────────────────────────────────────────────────────────────
    Role:
      type: string
      enum: [viewer, commenter, contributor, moderator, admin, owner]

    SpaceType:
      type: string
      enum: [general, crm, support, community, knowledge_base]

    ThreadType:
      type: string
      enum: [wiki, documentation, tutorial, forum, support, lead]

    ThreadVisibility:
      type: string
      enum: [public, org-only, deft-only]

    MessageType:
      type: string
      enum: [note, email, call_log, comment, system, customer, agent_reply, draft, context, system_event]

    FlagStatus:
      type: string
      enum: [open, resolved, dismissed]

    ChannelType:
      type: string
      enum: [email, voice, chat]

    CallDirection:
      type: string
      enum: [inbound, outbound]

    CallStatus:
      type: string
      enum: [ringing, active, completed, failed, escalated]

    LeadStatus:
      type: string
      enum: [anonymous, registered, converted]

    RoutingAction:
      type: string
      enum: [support_ticket, sales_lead, general]

    DLQStatus:
      type: string
      enum: [failed, retrying, resolved, dismissed]

    AuditAction:
      type: string
      enum: [create, update, delete]

    # ─── Models ────────────────────────────────────────────────────────────
    Org:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        metadata:
          type: string
        billing_tier:
          type: string
        payment_status:
          type: string
        suspended_at:
          type: string
          format: date-time
          nullable: true
        suspend_reason:
          type: string
        suspended_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Space:
