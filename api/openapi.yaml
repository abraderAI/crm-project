openapi: 3.1.0
info:
  title: DEFT Evolution CRM API
  version: 1.0.0
  description: |
    REST API for the DEFT Evolution CRM platform.
    All authenticated endpoints require a Bearer JWT or API key.
    Errors follow RFC 7807 Problem Details (`application/problem+json`).
    Pagination is cursor-based using UUIDv7-encoded cursors.
  contact:
    name: DEFT Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.deft.example.com
    description: Production

tags:
  - name: health
    description: Health check endpoints
  - name: orgs
    description: Organization management
  - name: spaces
    description: Space management within orgs
  - name: boards
    description: Board management within spaces
  - name: threads
    description: Thread management within boards
  - name: messages
    description: Message management within threads
  - name: members
    description: Membership management (org, space, board)
  - name: votes
    description: Thread voting
  - name: moderation
    description: Moderation flags and thread operations
  - name: webhooks
    description: Webhook subscription management
  - name: notifications
    description: User notifications and preferences
  - name: uploads
    description: File upload management
  - name: revisions
    description: Content revision history
  - name: search
    description: Full-text search
  - name: billing
    description: Billing and invoicing
  - name: voice
    description: Voice call management
  - name: channels
    description: IO channel gateway configuration
  - name: chat
    description: AI chat widget sessions
  - name: pipeline
    description: CRM pipeline stage management
  - name: admin
    description: Platform administration (requires platform admin)
  - name: reporting
    description: Org-level and platform reporting
  - name: global-spaces
    description: Platform-wide global spaces (forum, support, leads)
  - name: support
    description: Support ticket entries
  - name: tier
    description: User tier and home preferences
  - name: conversion
    description: Tier upgrade and lead conversion flows
  - name: api-keys
    description: API key management
  - name: websocket
    description: Real-time WebSocket connection

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  # ─── Health ────────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: getHealthz
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      operationId: getReadyz
      tags: [health]
      summary: Readiness probe (includes DB check)
      security: []
      responses:
        "200":
          description: Server is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── API Root ──────────────────────────────────────────────────────────────
  /v1:
    get:
      operationId: getApiRoot
      tags: [health]
      summary: API version info
      security: []
      responses:
        "200":
          description: API version and status
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: v1
                  status:
                    type: string
                    example: ok

  # ─── WebSocket ─────────────────────────────────────────────────────────────
  /v1/ws:
    get:
      operationId: wsUpgrade
      tags: [websocket]
      summary: Upgrade to WebSocket connection
      description: Auth via query param token. Returns 101 Switching Protocols on success.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Webhooks (public) ─────────────────────────────────────────────────────
  /v1/webhooks/billing:
    post:
      operationId: handleBillingWebhook
      tags: [billing]
      summary: Billing provider webhook (HMAC-verified)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/webhooks/livekit:
    post:
      operationId: handleLiveKitWebhook
      tags: [voice]
      summary: LiveKit voice webhook (token-verified)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Internal Bridge ───────────────────────────────────────────────────────
  /v1/internal/contacts/lookup:
    get:
      operationId: lookupContact
      tags: [voice]
      summary: Internal contact lookup (X-Internal-Key auth)
      security: []
      parameters:
        - name: phone
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Contact found
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/internal/threads/{id}/summary:
    get:
      operationId: getThreadSummary
      tags: [voice]
      summary: Internal thread summary (X-Internal-Key auth)
      security: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Thread summary
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Chat Widget (public) ──────────────────────────────────────────────────
  /v1/chat/session:
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create anonymous chat session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSessionCreateInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message in a chat session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Message sent and AI response returned
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/chat/promote:
    post:
      operationId: promoteChatSession
      tags: [chat]
      summary: Promote anonymous chat session to authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  format: uuid
              required: [session_id]
      responses:
        "200":
          description: Session promoted
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── User Tier & Preferences ───────────────────────────────────────────────
  /v1/me/tier:
    get:
      operationId: getMyTier
      tags: [tier]
      summary: Get current user's tier information
      responses:
        "200":
          description: Tier info
          content:
            application/json:
              schema:
                type: object
                properties:
                  tier:
                    type: integer
                    example: 2
                  name:
                    type: string
                    example: registered
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/me/home-preferences:
    get:
      operationId: getHomePreferences
      tags: [tier]
      summary: Get user's home screen widget preferences
      responses:
        "200":
          description: Home preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserHomePreferences"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: putHomePreferences
      tags: [tier]
      summary: Replace user's home screen widget preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserHomePreferencesInput"
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserHomePreferences"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Conversion ────────────────────────────────────────────────────────────
  /v1/me/upgrade:
    post:
      operationId: selfServiceUpgrade
      tags: [conversion]
      summary: Self-service upgrade from Tier 2 to Tier 3
      responses:
        "200":
          description: Upgrade successful
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/leads/{lead_id}/convert:
    post:
      operationId: salesConvertLead
      tags: [conversion]
      summary: Sales-assisted lead conversion (DEFT members only)
      parameters:
        - name: lead_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Lead converted
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─── Search ────────────────────────────────────────────────────────────────
  /v1/search:
    get:
      operationId: search
      tags: [search]
      summary: Full-text search across threads and messages
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
        - name: type
          in: query
          schema:
            type: string
            enum: [thread, message]
          description: Restrict search to entity type
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Uploads ───────────────────────────────────────────────────────────────
  /v1/uploads:
    post:
      operationId: createUpload
      tags: [uploads]
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                org_id:
                  type: string
                entity_type:
                  type: string
                entity_id:
                  type: string
              required: [file, org_id, entity_type, entity_id]
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/uploads/{id}:
    get:
      operationId: getUpload
      tags: [uploads]
      summary: Get upload metadata
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Upload metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUpload
      tags: [uploads]
      summary: Delete an upload
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Upload deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/uploads/{id}/download:
    get:
      operationId: downloadUpload
      tags: [uploads]
      summary: Download an uploaded file
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Revisions ─────────────────────────────────────────────────────────────
  /v1/revisions/{entityType}/{entityID}:
    get:
      operationId: listRevisions
      tags: [revisions]
      summary: List revision history for an entity
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [thread, message]
        - name: entityID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Revision list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/revisions/{id}:
    get:
      operationId: getRevision
      tags: [revisions]
      summary: Get a single revision
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Revision detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revision"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Orgs ──────────────────────────────────────────────────────────────────
  /v1/orgs:
    post:
      operationId: createOrg
      tags: [orgs]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgCreateInput"
      responses:
        "201":
          description: Org created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listOrgs
      tags: [orgs]
      summary: List organizations
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated org list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgListResponse"

  /v1/orgs/{org}:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    get:
      operationId: getOrg
      tags: [orgs]
      summary: Get an organization by ID or slug
      responses:
        "200":
          description: Org detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateOrg
      tags: [orgs]
      summary: Partially update an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgUpdateInput"
      responses:
        "200":
          description: Org updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteOrg
      tags: [orgs]
      summary: Soft-delete an organization
      responses:
        "204":
          description: Org deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── API Keys ──────────────────────────────────────────────────────────────
  /v1/orgs/{org}/api-keys:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    post:
      operationId: createApiKey
      tags: [api-keys]
      summary: Create an API key for the org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreateInput"
      responses:
        "201":
          description: API key created (key value returned only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listApiKeys
      tags: [api-keys]
      summary: List API keys for the org
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"

  /v1/orgs/{org}/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
      - $ref: "#/components/parameters/IdPath"
    delete:
      operationId: revokeApiKey
      tags: [api-keys]
      summary: Revoke an API key
      responses:
        "204":
          description: API key revoked
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Voice Calls ───────────────────────────────────────────────────────────
  /v1/orgs/{org}/calls:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    post:
      operationId: logCall
      tags: [voice]
      summary: Log a voice call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallLogCreateInput"
      responses:
        "201":
          description: Call logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/orgs/{org}/calls/{call}:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
      - name: call
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCallTranscript
      tags: [voice]
      summary: Get call transcript
      responses:
        "200":
          description: Call with transcript
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/orgs/{org}/calls/{call}/escalate:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
      - name: call
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: escalateCall
      tags: [voice]
      summary: Escalate a call to a human agent
      responses:
        "200":
          description: Call escalated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Org Members ───────────────────────────────────────────────────────────
  /v1/orgs/{org}/members:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    post:
      operationId: addOrgMember
      tags: [members]
      summary: Add a member to the org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      operationId: listOrgMembers
      tags: [members]
      summary: List org members
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgMembership"

  /v1/orgs/{org}/members/{userID}:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
      - $ref: "#/components/parameters/UserIdPath"
    patch:
      operationId: updateOrgMember
      tags: [members]
      summary: Update a member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: "#/components/schemas/Role"
              required: [role]
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeOrgMember
      tags: [members]
      summary: Remove a member from the org
      responses:
        "204":
          description: Member removed
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Billing ───────────────────────────────────────────────────────────────
  /v1/orgs/{org}/billing:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    get:
      operationId: getBillingStatus
      tags: [billing]
      summary: Get billing status for org
      responses:
        "200":
          description: Billing status
          content:
            application/json:
              schema:
                type: object

  /v1/orgs/{org}/billing/customers:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    post:
      operationId: createBillingCustomer
      tags: [billing]
      summary: Create billing customer for org
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                type: object

  /v1/orgs/{org}/billing/invoices:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    post:
      operationId: createInvoice
      tags: [billing]
      summary: Create an invoice
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                type: object

  # ─── Vote ──────────────────────────────────────────────────────────────────
  /v1/vote/weights:
    get:
      operationId: getVoteWeights
      tags: [votes]
      summary: Get vote weight configuration table
      responses:
        "200":
          description: Weight table
          content:
            application/json:
              schema:
                type: object
                properties:
                  role_weights:
                    type: object
                    additionalProperties:
                      type: integer
                  tier_bonuses:
                    type: object
                    additionalProperties:
                      type: integer
                  default_weight:
                    type: integer

  # ─── Moderation Flags ──────────────────────────────────────────────────────
  /v1/orgs/{org}/flags:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
    post:
      operationId: createFlag
      tags: [moderation]
      summary: Create a moderation flag on a thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlagInput"
      responses:
        "201":
          description: Flag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: listFlags
      tags: [moderation]
      summary: List open moderation flags for org
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Flag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagListResponse"

  /v1/orgs/{org}/flags/{flag}/resolve:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
      - name: flag
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: resolveFlag
      tags: [moderation]
      summary: Resolve a moderation flag
      responses:
        "200":
          description: Flag resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flag"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/orgs/{org}/flags/{flag}/dismiss:
    parameters:
      - $ref: "#/components/parameters/OrgPath"
      - name: flag
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: dismissFlag
      tags: [moderation]
      summary: Dismiss a moderation flag
      responses:
        "200":
          description: Flag dismissed
          content:
            application/json:
              schema:
